<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Front Page</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Baloo+Bhai+2&family=Poppins:wght@300&display=swap');
        body{
            background-color: var(--bodybgcolor);
        }
        :root {
            --bgcolor: rgb(0, 119, 255);
            --acolor: rgb(255, 221, 0);
            --bodybgcolor: rgb(0, 246, 201);
            --fontop: 'Poppins', sans-serif;
        }
        *{
            padding: 0;
            margin: 0;
        }
        .nav{
            background-color: var(--bgcolor);
        }
        .nav ul{
            padding: 10px 10px;
            display: flex;
            list-style: none;
            /* font-weight: bolder; */
        }
        .nav ul li a{
            font-size: 20px;
            margin: 20px;
            color: var(--acolor);
            text-decoration: none;
            font-family: var(--fontop);
        }
    </style>
</head>
<body>
    <!-- Create a multicolor website which can change color using CSS Variables -->
     <div class="nav">
        <ul>
            <li><a href="">HOME</a></li>
            <li><a href="">SERVICES</a></li>
            <li><a href="">ABOUT</a></li>
            <li><a href="">CONTACT</a></li>
        </ul>
     </div>
     <div class="container"></div>
</body>
</html>
