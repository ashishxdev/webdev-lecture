<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flexbox</title>
    <style>
        *{
            padding: 0;
            margin: 0;
        }
        .container{
            display: flex;
            margin: 20px;
            height: 80vh;
            border: 2px solid black;
            /* justify-content: center; */
            align-items: center; 
            /* flex-direction: column; */
            /* flex-direction: row; */
            /* flex-wrap: wrap-reverse; */
            /* flex-wrap: wrap; */
            /* flex-flow: row wrap; */
            /* flex-flow: row-reverse; */
            /* align-content: center; */
            /* align-items: center; */
            /* gap: 20px; */
            /* row-gap: 20px;
            column-gap: 20px; */
            gap: 40px 10px
        }
        .item{
            /* flex-grow: 1; */
            height: 50px;
            width: 40px;
            border: 2px solid purple;
            background-color: red;
            /* margin: 4px; */
        }
        .item1{
            /* flex-grow: 2; */
            /* flex-shrink: 3; */
            align-self: flex-start;
        }
        .item3{
            align-self: flex-end;
        }
        .order-1{
            order: 1;
        }
        /* items with no order are of order-0 */
        .order-2{
            order: 2;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="item item1">1</div>
        <div class="item">2</div>
        <div class="item item3">3</div>
        <div class="item order-1">4</div>
        <div class="item order-2">65</div>
    </div>
    
</body>
</html>
