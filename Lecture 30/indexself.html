<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Variables</title>
    <style>
        :root {
            --color: rgb(244, 227, 35);
            --seccolor: orange;
            --defpad: 20px;
            --defopacity: 0.5;
        }
        *{
            padding: 0px;
            margin: 0px;
        }
        .nav {
            background-color: cyan;
        }
        ul {
            display: flex;
        }
        ul li {
            --color: pink;
            list-style: none;
            /* padding: 12px; */
            padding: var(--defpad);
            margin: 20px;
            border: 2px solid var(--color);
            opacity: var(--defopacity);
        }
        ul li:first-child {
            /* background-color: rgb(0, 255, 51); */
            background-color: var(--color);
        }
        .container {
            /* background-color: rgb(255, 136, 0); */
            /* background-color: var(--seccolor); */
            background-color: var(--seccolor,blue);
        }
    </style>
</head>
<body>
    <div class="nav">
        <ul>
            <li>Home</li>
            <li>About</li>
            <li>Contact</li>
        </ul>
    </div>
    <div class="container">Lorem ipsum dolor, sit amet consectetur adipisicing elit. Temporibus laborum debitis, blanditiis neque, dolore cupiditate quisquam architecto excepturi modi rerum ullam eum asperiores odit culpa consequuntur praesentium perferendis? Voluptas, saepe.</div>
</body>
</html>
