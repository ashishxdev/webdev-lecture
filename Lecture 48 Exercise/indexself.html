<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
    .container {
            height: 50vh;
            width: 100%;
            background-color: rgb(255, 0, 0);
            position: relative;
           

        }

        .ball {
            height: 70px;
            width: 70px;
            background-color: rgb(0, 0, 0);
            position: absolute;
            border-radius: 50%;
            bottom: 0px;

            animation: ball 8s linear infinite;

        }

        @keyframes ball {
            0%{
                left: 0;
                bottom: 0;
            }

            10%{
                left: 10%;
                bottom: 60%;
            }
            20%{
                left: 20%;
                bottom: 0%;
            }

            30%{
                left: 30%;
                bottom: 50%;

            }
            40%{
                left: 40%;
                bottom: 0;
            }
            50%{
                left: 50%;
                bottom: 40%;
            }

            70%{
                left: 60%;
                bottom: 0%;
            }
            80%{
                left: 70%;
                bottom: 30%;
            }
            90%{
                left: 80%;
                bottom: 0%;
            }
            100%{
                left: 90%;
                bottom: 20%;
            }

        }
    </style>
</head>

<body>
    <div class="container">

        <div class="ball">
        </div>
    </div>
    <!-- 
   
     -->
</body>

</html>
