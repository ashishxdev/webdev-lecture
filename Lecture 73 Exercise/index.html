<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercise 13</title>
    <style>
        .container {
            display: flex;
            background-color: black;
            padding: 8px;
            height: 140px;
            border-radius: 4px;
        }

        .duration {
            background-color: black;
            border-radius: 5px;
            padding: 2px;
            color: white;
            position: absolute;
            top: 130px;
            left: 218px;
            opacity: 0.8;
        }

        .img>img {
            border-radius: 10px;
        }

        .title {
            font-size: 25px;
            font-weight: 600;
            margin: 6px;
            color: white;
        }

        .details {
            color: gray;
            font-size: 15px;
            margin: 6px;
            margin-top: 12px;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="img">
            <img class="image" src="" alt="">
            <div class="duration">32:22</div>
        </div>

        <div class="others">
            <div class="title"></div>
            <div class="details"></div>
        </div>
    </div>
    <script>
        function createCard(title, cName, views, monthsOld, duration, thumbnail) {
            document.querySelector(".duration").innerHTML = duration;
            document.querySelector(".title").innerHTML = title;
            if (views >= 1000000) views = views / 1000000 + "M";
            else if (views >= 1000) views = views / 1000 + "K";
            if (monthsOld > 12) { 
                let years = (monthsOld / 12).toFixed(1);
                if (years.endsWith(".0")){
                    years = years.slice(0,-1);
                }
                agetext = years + " year ago";}
            else { agetext = monthsOld + " months ago";}
            document.querySelector(".details").innerHTML = cName + " . " + views + " views . " + agetext;
            document.querySelector(".image").src = thumbnail;
        }
        createCard("Introduction to Backend | Sigma Web Dev video #2", "CodeWithHarry", 560000, 14, "31:22", "https://i.ytimg.com/vi/tVzUXW6siu0/hqdefault.jpg?sqp=-oaymwEcCPYBEIoBSFXyq4qpAw4IARUAAIhCGAFwAcABBg==&rs=AOn4CLACwWOixJVrKLFindK92kYMgTcQbw"); 
    </script>
</body>
</html>
