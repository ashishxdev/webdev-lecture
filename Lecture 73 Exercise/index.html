<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercise 13</title>
    <style>
        .container {
            display: flex;
            flex-direction: column;
            gap: 30px;
        }

        .card {
            display: flex;
            background-color: black;
            padding: 8px;
            height: 140px;
            border-radius: 4px;
        }

        .img {
            position: relative;
        }

        .img>img {
            border-radius: 10px;
            height: 100%;  
        }

        .duration {
            background-color: black;
            border-radius: 5px;
            padding: 2px 4px;
            color: white;
            position: absolute;
            bottom: 8px; 
            right: 8px;
            opacity: 0.8;
            font-size: 12px;
        }

        .others {
            display: flex;
            flex-direction: column;
            justify-content: center;
            margin-left: 12px;
        }

        .title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 6px;
            color: white;
        }

        .details {
            color: gray;
            font-size: 14px;
        }
    </style>
</head>

<body>
    <div class="container"></div>
    <script src="script.js"></script>
</body>
</html>
