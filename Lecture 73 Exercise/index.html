<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercise 13</title>
    <style>
        .container {
            display: flex;
            flex-direction: column;
            gap: 30px;
        }

        .card {
            display: flex;
            background-color: black;
            padding: 8px;
            height: 140px;
            border-radius: 4px;
        }

        .img {
            position: relative;
        }

        .img>img {
            border-radius: 10px;
            height: 100%;  
        }

        .duration {
            background-color: black;
            border-radius: 5px;
            padding: 2px 4px;
            color: white;
            position: absolute;
            bottom: 8px; 
            right: 8px;
            opacity: 0.8;
            font-size: 12px;
        }

        .others {
            display: flex;
            flex-direction: column;
            justify-content: center;
            margin-left: 12px;
        }

        .title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 6px;
            color: white;
        }

        .details {
            color: gray;
            font-size: 14px;
        }
    </style>
</head>

<body>
    <div class="container"></div>

    <script>
        function createCard(title, cName, views, monthsOld, duration, thumbnail) {
            if (views >= 1000000) views = (views / 1000000).toFixed(1) + "M";
            else if (views >= 1000) views = (views / 1000) + "K";

            let agetext;
            if (monthsOld > 12) {
                let years = (monthsOld / 12).toFixed(1);
                if (years.endsWith(".0")) years = years.slice(0, -2);
                agetext = years + " year ago";
            } else {
                agetext = monthsOld + " months ago";
            }

            let html = `
            <div class="card">
                <div class="img">
                    <img class="image" src="${thumbnail}" alt="">
                    <div class="duration">${duration}</div>
                </div>
                <div class="others">
                    <div class="title">${title}</div>
                    <div class="details">${cName} • ${views} views • ${agetext}</div>
                </div>
            </div>`;
            document.querySelector(".container").innerHTML += html;
        }

        createCard(
            "Introduction to Backend | Sigma Web Dev video #2",
            "CodeWithHarry",
            560000,
            14,
            "31:22",
            "https://i.ytimg.com/vi/tVzUXW6siu0/hqdefault.jpg?sqp=-oaymwEcCPYBEIoBSFXyq4qpAw4IARUAAIhCGAFwAcABBg==&rs=AOn4CLACwWOixJVrKLFindK92kYMgTcQbw"
        );
    </script>
</body>
</html>
