<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercise 5</title>
    <style>
        *{
            margin: 0;
            padding: 0;
        }
        header{
            position: sticky;
            top: 0;
        }
        nav{
            height: 90px;
            background-color: pink;
        }
        main{
            background-color: black;
            padding: 40px;
        }
        .box{
            background-color: green;
            margin: 20px 40px;
            padding: 60px 30px;
            text-align: center;
        }
        .box1{
            background-color: pink;
            height: 80vh;
            margin: 0 12px;
            width: 45%;
            display: inline-block;
        }
        .box2{
            background-color: blue;
            height: 80vh;
            margin: 0 12px;
            width: 45%;
            display: inline-block;
        }
        .text-box{
            border-radius: 30px;
            color: white;
            font-size: 30px;
            margin: 30px 34vw;
            padding: 34px;
            border: 2px solid white;
            text-align: center;
        }
        .icon {
            position: fixed;
            background: orange;
            height: 90px;
            width:90px;
            bottom: 100px;
            right: 23px;
            border-radius: 50px;
        }
        footer{
            background-color: aliceblue;
            height: 100px;
        }
    </style>
</head>
<body>
    <header>
        <nav></nav>
    </header>
    <main>
    <div class="box">
        <div class="box1"></div>
        <div class="box2"></div>
    </div>
    <div class="text-box">
        Welcome to this Sigma Web Development Express
    </div>
    <div class="icon"></div>
    </main>
    <footer>
    </footer>
</body>
</html>
