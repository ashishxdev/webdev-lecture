<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nav Bar</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300&display=swap');
        body{
            background-color: red;
            margin: 0;
            padding: 0;
        }
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
            font-weight: 100;
            font-size: 18px;
        }
        nav{
            padding: 10px 50px;
            background-color: white;
            display: flex;
            align-items: center;
            margin: 0px;
            justify-content: space-between;
            width: 100%;
        }
        .box{
            padding: 30px 40px;
        }
        img{
            padding: 0px 20px;
        }
        .buy{
            border: 2px solid black;
            font-weight: bolder;
            border-radius: 4px;
            padding: 5px 10px;
            margin: 0px 40px 0px 0px;
        }
        ul{
            display: flex;
        }
        li{
            list-style: none;
            margin: 0px 30px;
        }
    </style>
</head>
<body>
    <nav>
    <div class="image">
        <img src="https://www.ultraedit.com/wp-content/uploads/2023/01/Frame-1-2.png" alt="">
        </div>
        <div class="items">
        <ul>
            <li>Products</li>
            <li>Pricing</li>
            <li>Resources</li>
            <li>Our company</li>
        </ul>
        </div>
        <div class="box">
            <span class="buy">BUY NOW</span>
            <span class="language">English</span>
        </div>
        </nav>
</body>
</html>
